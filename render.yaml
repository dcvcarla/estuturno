services:
  - type: web
    name: estuturno-backend
    env: node
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx tsc
    startCommand: npx prisma db push && npx prisma db seed && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: CORS_ORIGINS
        value: https://estuturno-frontend.onrender.com

  - type: static_site
    name: estuturno-frontend
    region: ohio
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://estuturno-backend.onrender.com
